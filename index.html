<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murthu TechHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#2563EB; --blue-light:#60A5FA; --purple:#7C3AED; --cyan:#06B6D4; --emerald:#10B981; --amber:#F59E0B;
    --bg:#070B14; --bg-soft:#0D1220; --surface:#111828; --surface-2:#161F33;
    --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
    --text:#EAF0FB; --text-dim:#9AA7C2; --text-mute:#5C6B8A; --radius:16px;
    --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  html[data-theme="light"]{
    --bg:#F6F8FC; --bg-soft:#FFFFFF; --surface:#FFFFFF; --surface-2:#F0F3FA;
    --border:rgba(15,23,42,0.08); --border-strong:rgba(15,23,42,0.14);
    --text:#0F172A; --text-dim:#475069; --text-mute:#8792A8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:var(--font-body); line-height:1.6; -webkit-font-smoothing:antialiased;}
  a{color:inherit; text-decoration:none; cursor:pointer;}
  .wrap{max-width:1240px; margin:0 auto; padding:0 32px;}
  .grad-text{background:linear-gradient(100deg, var(--blue-light), var(--purple) 55%, var(--cyan)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  section{padding:64px 0;}
  h2{font-family:var(--font-display); font-weight:700; font-size:30px; letter-spacing:-0.01em;}
  .section-head{display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:32px; gap:20px; flex-wrap:wrap;}
  .section-sub{color:var(--text-dim); font-size:14.5px; margin-top:8px; max-width:460px;}
  .see-all{font-size:14px; font-weight:600; color:var(--blue-light); display:flex; align-items:center; gap:6px;}

  header{position:sticky; top:0; z-index:50; backdrop-filter:blur(16px); background:color-mix(in srgb, var(--bg) 70%, transparent); border-bottom:1px solid var(--border);}
  nav{display:flex; align-items:center; justify-content:space-between; padding:16px 0;}
  .logo{display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:700; font-size:18px;}
  .logo-mark{width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg, var(--blue), var(--purple)); display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff;}
  .navlinks{display:flex; gap:28px; font-size:14px; font-weight:500; color:var(--text-dim);}
  .navlinks a.active{color:var(--text);}
  .navlinks a:hover{color:var(--text);}
  .navcta{display:flex; gap:10px; align-items:center;}
  .btn{font-weight:600; font-size:13.5px; cursor:pointer; border-radius:10px; padding:9px 16px; border:1px solid var(--border-strong); background:transparent; color:var(--text); display:inline-flex; align-items:center; gap:6px;}
  .btn:hover{background:var(--surface-2);}
  .btn-primary{background:linear-gradient(100deg, var(--blue), var(--purple)); border:none; color:#fff;}
  .theme-toggle{width:36px; height:36px; border-radius:9px; border:1px solid var(--border-strong); background:var(--surface); cursor:pointer;}

  /* HOME */
  .hero{padding:64px 0 40px;}
  .hero-grid{display:grid; grid-template-columns:1.05fr 0.95fr; gap:50px; align-items:center;}
  h1{font-family:var(--font-display); font-weight:700; font-size:48px; line-height:1.1; letter-spacing:-0.02em;}
  .hero p.sub{margin-top:18px; font-size:16.5px; color:var(--text-dim); max-width:500px;}
  .eyebrow{display:inline-flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:13px; color:var(--emerald);}
  .eyebrow::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--emerald); box-shadow:0 0 8px var(--emerald);}
  .term{background:var(--bg-soft); border:1px solid var(--border-strong); border-radius:16px; box-shadow:0 30px 80px -20px rgba(0,0,0,0.5); overflow:hidden;}
  html[data-theme="light"] .term{box-shadow:0 30px 60px -25px rgba(15,23,42,0.25);}
  .term-bar{display:flex; align-items:center; gap:8px; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--surface);}
  .dot{width:10px; height:10px; border-radius:50%;}
  .term-tab{margin-left:10px; font-family:var(--font-mono); font-size:12px; color:var(--text-dim);}
  .term-body{padding:20px 22px; font-family:var(--font-mono); font-size:13px; line-height:1.85;}
  .ln{color:var(--text-mute); display:inline-block; width:20px;}
  .kw{color:#C792EA;} .fn{color:#82AAFF;} .str{color:#C3E88D;} .cm{color:var(--text-mute);}
  .cursor{display:inline-block; width:7px; height:14px; background:var(--emerald); vertical-align:-2px; animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}
  .term-output{margin-top:12px; padding-top:12px; border-top:1px dashed var(--border); color:var(--emerald); font-size:12px;}
  .term-output .muted{color:var(--text-mute);}

  .cat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px;}
  .cat-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; transition:transform .2s, border-color .2s;}
  .cat-card:hover{transform:translateY(-3px); border-color:var(--border-strong);}
  .cat-icon{width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:14px;}
  .cat-card h3{font-family:var(--font-display); font-size:16px; font-weight:600; margin-bottom:5px;}
  .cat-card p{font-size:12.5px; color:var(--text-dim);}

  .course-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
  .course-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:transform .2s, border-color .2s; cursor:pointer;}
  .course-card:hover{transform:translateY(-3px); border-color:var(--border-strong);}
  .course-thumb{height:130px; position:relative; display:flex; align-items:flex-start; justify-content:space-between; padding:14px;}
  .course-thumb .lvl{font-family:var(--font-mono); font-size:10.5px; padding:4px 9px; border-radius:100px; background:rgba(0,0,0,0.35); color:#fff;}
  .course-thumb .lock{font-size:14px; background:rgba(0,0,0,0.4); width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff;}
  .course-body{padding:18px;}
  .course-body h3{font-family:var(--font-display); font-size:15.5px; font-weight:600; margin-bottom:6px;}
  .course-body p{font-size:12.5px; color:var(--text-dim); margin-bottom:14px;}
  .course-meta{display:flex; align-items:center; justify-content:space-between; font-size:12px; color:var(--text-mute); font-family:var(--font-mono); border-top:1px solid var(--border); padding-top:12px;}
  .progress-track{height:4px; background:var(--border); border-radius:100px; margin-top:10px; overflow:hidden;}
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--blue), var(--cyan)); border-radius:100px;}
  .enroll-badge{font-family:var(--font-mono); font-size:10.5px; color:var(--emerald); border:1px solid var(--emerald); padding:2px 8px; border-radius:100px;}

  /* COURSE DETAIL */
  .course-hero{padding:32px 0 26px; border-bottom:1px solid var(--border);}
  .breadcrumb{font-size:12.5px; color:var(--text-mute); font-family:var(--font-mono); margin-bottom:12px;}
  .breadcrumb a:hover{color:var(--text-dim);}
  .course-hero h1{font-family:var(--font-display); font-size:30px; font-weight:700; letter-spacing:-0.01em; max-width:680px;}
  .course-hero .desc{color:var(--text-dim); margin-top:8px; max-width:640px; font-size:14.5px;}
  .meta-row{display:flex; flex-wrap:wrap; gap:20px; margin-top:18px; font-size:13px; color:var(--text-dim); align-items:center;}
  .meta-row b{color:var(--text);}
  .stars{color:var(--amber); letter-spacing:1px;}
  .instructor{display:flex; align-items:center; gap:9px;}
  .avatar{width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:600; font-size:12px; color:#fff; flex-shrink:0;}
  .overall-progress{margin-top:20px; max-width:420px;}
  .op-top{display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); font-family:var(--font-mono); margin-bottom:6px;}
  .op-track{height:8px; border-radius:100px; background:var(--surface-2); overflow:hidden;}
  .op-fill{height:100%; background:linear-gradient(90deg, var(--blue), var(--cyan)); border-radius:100px; transition:width .4s ease;}
  .access-row{margin-top:22px;}

  .layout{display:grid; grid-template-columns:300px 1fr; gap:26px; padding:28px 0 56px; align-items:start;}
  .curriculum{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; position:sticky; top:70px; max-height:calc(100vh - 96px); overflow-y:auto;}
  .curr-head{padding:15px 18px; border-bottom:1px solid var(--border); font-family:var(--font-display); font-weight:600; font-size:14px; display:flex; justify-content:space-between;}
  .curr-head span{font-family:var(--font-mono); font-weight:400; font-size:11.5px; color:var(--text-mute);}
  .module{border-bottom:1px solid var(--border);}
  .module-title{padding:12px 18px; font-size:12px; font-weight:600; color:var(--text-dim); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.03em; background:var(--surface-2);}
  .lesson{display:flex; align-items:center; gap:10px; padding:11px 18px; font-size:13px; cursor:pointer; border-left:2px solid transparent;}
  .lesson:hover{background:var(--surface-2);}
  .lesson.active{background:var(--surface-2); border-left-color:var(--blue); color:var(--text);}
  .check{width:16px; height:16px; border-radius:50%; border:1.5px solid var(--border-strong); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9.5px;}
  .check.done{background:var(--emerald); border-color:var(--emerald); color:#07120c;}
  .lesson span.name{color:var(--text-dim); flex:1;}
  .lesson.active span.name, .lesson.done span.name{color:var(--text);}
  .lesson.locked span.name{color:var(--text-mute);}
  .lesson .time{font-family:var(--font-mono); font-size:10.5px; color:var(--text-mute);}
  .lesson .lock-ic{font-size:11px; color:var(--text-mute);}

  .content-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:30px;}
  .lesson-eyebrow{font-family:var(--font-mono); font-size:12px; color:var(--cyan);}
  .content-card h2{font-family:var(--font-display); font-size:22px; font-weight:700; margin:10px 0 14px;}
  .content-card p{color:var(--text-dim); font-size:14px; margin-bottom:12px;}
  .code-block{background:var(--bg-soft); border:1px solid var(--border); border-radius:12px; padding:16px 18px; font-family:var(--font-mono); font-size:12.5px; margin:16px 0; overflow-x:auto; color:var(--text-dim);}
  .lesson-nav{display:flex; justify-content:space-between; align-items:center; margin-top:24px; padding-top:20px; border-top:1px solid var(--border);}
  .complete-btn{background:linear-gradient(100deg, var(--emerald), var(--cyan)); border:none; font-weight:600; font-size:13px; padding:10px 18px; border-radius:10px; cursor:pointer; color:#052e1d;}
  .complete-btn.done{opacity:0.55; cursor:default;}
  .navpair{display:flex; gap:10px;}

  .locked-panel{text-align:center; padding:50px 20px;}
  .locked-panel .lock-icon{font-size:34px; margin-bottom:14px;}
  .locked-panel h2{font-family:var(--font-display); font-size:20px; margin-bottom:10px;}
  .locked-panel p{color:var(--text-dim); font-size:14px; max-width:400px; margin:0 auto 22px;}

  .reviews{margin-top:28px;}
  .rev-summary{display:grid; grid-template-columns:190px 1fr; gap:30px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:26px; align-items:center;}
  .rev-score{text-align:center; border-right:1px solid var(--border); padding-right:30px;}
  .rev-score b{font-family:var(--font-display); font-size:42px; font-weight:700; display:block;}
  .rev-bar-row{display:flex; align-items:center; gap:9px; font-size:11.5px; color:var(--text-mute); font-family:var(--font-mono); margin-bottom:6px;}
  .rev-bar-track{flex:1; height:6px; background:var(--surface-2); border-radius:100px; overflow:hidden;}
  .rev-bar-fill{height:100%; background:var(--amber); border-radius:100px;}
  .write-review{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 24px; margin-top:16px;}
  .write-review h3{font-family:var(--font-display); font-size:15.5px; margin-bottom:12px;}
  .star-pick{display:flex; gap:4px; font-size:20px; cursor:pointer; margin-bottom:10px; color:var(--border-strong); width:max-content;}
  .star-pick span.on{color:var(--amber);}
  .write-review textarea{width:100%; background:var(--bg-soft); border:1px solid var(--border-strong); border-radius:10px; color:var(--text); font-family:var(--font-body); font-size:13px; padding:11px 13px; min-height:76px; resize:vertical; outline:none; margin-bottom:10px;}
  .write-review input[type=text]{width:100%; background:var(--bg-soft); border:1px solid var(--border-strong); border-radius:10px; color:var(--text); font-family:var(--font-body); font-size:13px; padding:9px 13px; outline:none; margin-bottom:10px;}
  .review-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 22px; margin-top:12px;}
  .review-person{display:flex; align-items:center; gap:10px;}
  .review-person b{font-size:13px;}
  .review-person span{font-size:11px; color:var(--text-mute); font-family:var(--font-mono);}
  .review-card p{color:var(--text-dim); font-size:13px; margin-top:8px;}
  .verified{font-size:10px; font-family:var(--font-mono); color:var(--emerald); border:1px solid var(--emerald); padding:2px 7px; border-radius:100px; margin-left:8px;}

  /* DASHBOARD */
  .dash-head{display:flex; justify-content:space-between; align-items:center; padding:36px 0 8px; flex-wrap:wrap; gap:14px;}
  .dash-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:24px 0 40px;}
  .dstat{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px;}
  .dstat b{display:block; font-family:var(--font-display); font-size:26px; font-weight:700;}
  .dstat span{font-size:12px; color:var(--text-dim); font-family:var(--font-mono);}
  .dash-course{display:grid; grid-template-columns:150px 1fr auto; gap:20px; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:14px;}
  .dash-thumb{height:74px; border-radius:11px;}
  .dash-course h3{font-family:var(--font-display); font-size:15.5px; margin-bottom:6px;}
  .dash-course .dmeta{font-size:12px; color:var(--text-mute); font-family:var(--font-mono); margin-bottom:8px;}
  .empty-state{text-align:center; padding:70px 20px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);}
  .empty-state .ic{font-size:32px; margin-bottom:14px;}
  .empty-state h3{font-family:var(--font-display); font-size:18px; margin-bottom:8px;}
  .empty-state p{color:var(--text-dim); font-size:14px; margin-bottom:20px;}

  footer{border-top:1px solid var(--border); padding:44px 0 26px; margin-top:20px;}
  .foot-bottom{display:flex; justify-content:space-between; align-items:center; font-size:12.5px; color:var(--text-mute); flex-wrap:wrap; gap:10px;}

  @media (max-width:980px){
    .hero-grid{grid-template-columns:1fr;}
    .cat-grid, .course-grid{grid-template-columns:repeat(2,1fr);}
    .layout{grid-template-columns:1fr;}
    .curriculum{position:static; max-height:none;}
    .rev-summary{grid-template-columns:1fr;}
    .rev-score{border-right:none; padding-right:0; border-bottom:1px solid var(--border); padding-bottom:18px;}
    .dash-stats{grid-template-columns:repeat(2,1fr);}
    .dash-course{grid-template-columns:1fr; text-align:left;}
    .navlinks{display:none;}
    h1{font-size:34px;}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <nav>
      <a class="logo" data-route="home" href="#home"><div class="logo-mark">M</div>Murthu<span style="color:var(--text-dim); font-weight:500;">TechHub</span></a>
      <div class="navlinks">
        <a data-route="courses" href="#courses">Courses</a>
        <a data-route="dashboard" href="#dashboard">My dashboard</a>
        <a href="#courses">Roadmaps</a>
        <a href="#courses">Community</a>
      </div>
      <div class="navcta">
        <button class="theme-toggle" id="themeToggle">🌙</button>
        <a class="btn btn-primary" data-route="dashboard" href="#dashboard">My dashboard</a>
      </div>
    </nav>
  </div>
</header>

<div id="app"></div>

<footer>
  <div class="wrap">
    <div class="foot-bottom">
      <span>© 2026 Murthu TechHub. Built for learners, not shareholders.</span>
      <span style="font-family:var(--font-mono);">Learn • Build • Share • Grow</span>
    </div>
  </div>
</footer>

<script>
/* ---------------- theme ---------------- */
const root = document.documentElement;
document.getElementById('themeToggle').addEventListener('click', () => {
  const isDark = root.getAttribute('data-theme') === 'dark';
  root.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
});

/* ---------------- data ---------------- */
const courseCatalog = {
  'dsa-python': {
    title:'DSA Mastery in Python', category:'Programming', level:'Beginner', hours:'20h 10m', enrolled:'18,204',
    instructor:'Arjun Kaushik', instructorInit:'AK', instructorGrad:'linear-gradient(135deg,#2563EB,#7C3AED)',
    thumbGrad:'linear-gradient(135deg,#0E7490,#2563EB)',
    desc:'Every core data structure and algorithm, taught with the exact problems companies actually ask — arrays through graphs, with 300+ practice problems along the way.',
    modules:[
      { title:'Foundations', lessons:[
        { id:'l1', name:'What is DSA and why it matters', time:'12m', html:`<span class="lesson-eyebrow">Module 1 · Foundations</span><h2>What is DSA and why it matters</h2><p>Data structures organize information; algorithms operate on it. This lesson frames why, with two real examples of slow code fixed by the right structure.</p><div class="code-block"><span class="kw">def</span> <span class="fn">find_user</span>(users, target_id):<br>&nbsp;&nbsp;<span class="cm"># O(n) — scans every record</span><br>&nbsp;&nbsp;<span class="kw">for</span> u <span class="kw">in</span> users:<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span> u.id == target_id: <span class="kw">return</span> u</div>` },
        { id:'l2', name:'Time & space complexity', time:'18m', html:`<span class="lesson-eyebrow">Module 1 · Foundations</span><h2>Time & space complexity</h2><p>Big-O predicts whether your code survives contact with real data. This lesson builds intuition with growth-rate comparisons you can reason about at a glance.</p>` },
        { id:'l3', name:'Big-O notation in practice', time:'15m', html:`<span class="lesson-eyebrow">Module 1 · Foundations</span><h2>Big-O notation in practice</h2><p>Classify five snippets by growth rate, then rewrite the worst offender from O(n²) to O(n log n).</p>` }
      ]},
      { title:'Arrays & strings', lessons:[
        { id:'l4', name:'Array fundamentals', time:'14m', html:`<span class="lesson-eyebrow">Module 2 · Arrays & strings</span><h2>Array fundamentals</h2><p>Contiguous memory, indexing cost, and why insertion at the front is expensive.</p>` },
        { id:'l5', name:'Two pointer technique', time:'20m', html:`<span class="lesson-eyebrow">Module 2 · Arrays & strings</span><h2>Two pointer technique</h2><p>Solve "pair sum" and "remove duplicates" with two pointers instead of nested loops — O(n²) down to O(n).</p><div class="code-block"><span class="kw">def</span> <span class="fn">has_pair_sum</span>(arr, target):<br>&nbsp;&nbsp;left, right = <span class="str">0</span>, len(arr)-<span class="str">1</span><br>&nbsp;&nbsp;<span class="kw">while</span> left &lt; right:<br>&nbsp;&nbsp;&nbsp;&nbsp;s = arr[left]+arr[right]<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span> s==target: <span class="kw">return</span> <span class="str">True</span></div>` },
        { id:'l6', name:'Sliding window problems', time:'22m', html:`<span class="lesson-eyebrow">Module 2 · Arrays & strings</span><h2>Sliding window problems</h2><p>Longest substring without repeats, max sum subarray of size k — the pattern behind a huge share of interview problems.</p>` }
      ]},
      { title:'Linked lists', lessons:[
        { id:'l7', name:'Singly linked lists', time:'16m', html:`<span class="lesson-eyebrow">Module 3 · Linked lists</span><h2>Singly linked lists</h2><p>Build one from scratch — insert, delete, traverse — then reverse it in place.</p>` },
        { id:'l8', name:'Detecting cycles', time:'19m', html:`<span class="lesson-eyebrow">Module 3 · Linked lists</span><h2>Detecting cycles</h2><p>Floyd's tortoise-and-hare, traced step by step so the "why" sticks.</p>` },
        { id:'l9', name:'Module project: LRU cache', time:'28m', html:`<span class="lesson-eyebrow">Module 3 · Linked lists</span><h2>Module project: LRU cache</h2><p>Combine a hash map and a doubly linked list into an LRU cache with O(1) get and put.</p>` }
      ]}
    ],
    reviews:[
      { name:'Deepak Verma', stars:5, verified:true, text:'The sliding window section alone was worth it — finally understood the pattern after failing two interviews on it.' },
      { name:'Anushka Reddy', stars:5, verified:true, text:'Genuinely well paced. The LRU cache project ties everything together instead of feeling bolted on.' },

/* ---------------- persistent storage ---------------- */
async function getEnrollments(){
  try{
    const res = await window.storage.get('enrollments', false);
    return res ? JSON.parse(res.value) : {};
  }catch(e){ return {}; }
}
async function saveEnrollments(data){
  try{ await window.storage.set('enrollments', JSON.stringify(data), false); }catch(e){}
}
async function enrollInCourse(courseId){
  const data = await getEnrollments();
  if(!data[courseId]) data[courseId] = { enrolledAt: Date.now(), progress: {} };
  await saveEnrollments(data);
}
async function markLessonDone(courseId, lessonId){
  const data = await getEnrollments();
  if(!data[courseId]) data[courseId] = { enrolledAt: Date.now(), progress: {} };
  data[courseId].progress[lessonId] = true;
  await saveEnrollments(data);
}
function flatLessons(course){ return course.modules.flatMap(m => m.lessons); }

/* ---------------- router ---------------- */
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

function currentRoute(){
  const hash = location.hash.replace('#','') || 'home';
  const parts = hash.split('/');
  return { name: parts[0], param: parts[1] };
}

function setActiveNav(routeName){
  document.querySelectorAll('.navlinks a').forEach(a => {
    a.classList.toggle('active', a.dataset.route === routeName);
  });
}

async function render(){
  const { name, param } = currentRoute();
  setActiveNav(name);
  const app = document.getElementById('app');
  if(name === 'course' && param){
    app.innerHTML = await renderCoursePage(param);
    wireCoursePage(param);
  } else if(name === 'courses'){
    app.innerHTML = renderCoursesPage();
    wireCoursesPage();
  } else if(name === 'dashboard'){
    app.innerHTML = await renderDashboard();
    wireDashboard();
  } else {
    app.innerHTML = renderHome();
    wireHome();
  }
  window.scrollTo(0,0);
}

        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
      <input type="text" id="searchFilter" placeholder="Search courses..." style="flex:1; min-width:200px; background:var(--surface); color:var(--text); border:1px solid var(--border-strong); border-radius:10px; padding:9px 14px; font-family:var(--font-body); font-size:13.5px; outline:none;">
    </div>
    <div id="resultCount" style="font-size:12.5px; color:var(--text-mute); font-family:var(--font-mono); margin-bottom:16px;"></div>
    <div class="course-grid" id="allCoursesGrid"></div>
  </div>`;
}

async function wireCoursesPage(){
  const categories = ['All', ...new Set(Object.values(courseCatalog).map(c => c.category))];
  const catEl = document.getElementById('categoryFilters');
  catEl.innerHTML = categories.map(cat =>
    `<button class="btn ${coursesFilterState.category===cat?'btn-primary':''}" data-cat="${cat}">${cat}</button>`
  ).join('');
  catEl.querySelectorAll('[data-cat]').forEach(b => {
    b.addEventListener('click', () => { coursesFilterState.category = b.dataset.cat; wireCoursesPage(); });
  });

  document.getElementById('levelFilter').value = coursesFilterState.level;
  document.getElementById('levelFilter').addEventListener('change', (e) => {
    coursesFilterState.level = e.target.value; renderFilteredGrid();
  });
  document.getElementById('searchFilter').value = coursesFilterState.search;
  document.getElementById('searchFilter').addEventListener('input', (e) => {
    coursesFilterState.search = e.target.value; renderFilteredGrid();
  });

  await renderFilteredGrid();
}

async function renderFilteredGrid(){
  const enrollments = await getEnrollments();
  const entries = Object.entries(courseCatalog).filter(([id, c]) => {
    const catOk = coursesFilterState.category === 'All' || c.category === coursesFilterState.category;
    const lvlOk = coursesFilterState.level === 'All' || c.level === coursesFilterState.level;
    const searchOk = !coursesFilterState.search || c.title.toLowerCase().includes(coursesFilterState.search.toLowerCase());
    return catOk && lvlOk && searchOk;
  });
  document.getElementById('resultCount').textContent = `${entries.length} course${entries.length===1?'':'s'} found`;
  const grid = document.getElementById('allCoursesGrid');
  if(entries.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="ic">🔍</div><h3>No courses match</h3><p>Try a different category, level, or search term.</p></div>`;
    return;
  }
  grid.innerHTML = entries.map(([id, c]) => {
    const isEnrolled = !!enrollments[id];
    return `
    <div class="course-card" data-nav="course/${id}">
      <div class="course-thumb" style="background:${c.thumbGrad};">
        <span class="lvl">${c.level}</span>
        ${!isEnrolled ? '<span class="lock">🔒</span>' : '<span class="enroll-badge">Enrolled</span>'}
      </div>
      <div class="course-body">
        <h3>${c.title}</h3>
        <p>${c.desc.slice(0,80)}...</p>
        <div class="course-meta"><span>${c.category}</span><span>${flatLessons(c).length} lessons · ${c.hours}</span></div>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => { location.hash = '#' + el.dataset.nav; });
  });
}

/* ---------------- COURSE PAGE ---------------- */
async function renderCoursePage(courseId){
  const course = courseCatalog[courseId];
  if(!course) return `<div class="wrap" style="padding:60px 0;"><h2>Course not found</h2></div>`;
  const enrollments = await getEnrollments();
  const enrollment = enrollments[courseId];
  const isEnrolled = !!enrollment;
  const all = flatLessons(course);
  const doneCount = isEnrolled ? all.filter(l => enrollment.progress[l.id]).length : 0;

  return `
  <section class="course-hero">
    <div class="wrap">
      <div class="breadcrumb"><a data-route="home" href="#home">Home</a> / <a data-route="courses" href="#courses">${course.category}</a> / ${course.title}</div>
      <h1>${course.title}</h1>
      <p class="desc">${course.desc}</p>
      <div class="meta-row">
        <div class="instructor"><div class="avatar" style="background:${course.instructorGrad};">${course.instructorInit}</div><span>${course.instructor}</span></div>
        <div><span class="stars">${starString(avgRating(course))}</span> <b>${avgRating(course)}</b> <span>(${course.reviews.length} reviews)</span></div>
        <div><b>${course.modules.length}</b> modules</div>
        <div><b>${course.hours}</b> total</div>
        <div><b>${course.enrolled}</b> enrolled</div>
      </div>
      <div class="access-row">
        ${isEnrolled
          ? `<div class="overall-progress"><div class="op-top"><span>Your progress</span><span>${doneCount} / ${all.length} lessons</span></div><div class="op-track"><div class="op-fill" style="width:${Math.round(doneCount/all.length*100)}%;"></div></div></div>`
          : `<button class="btn btn-primary" id="enrollBtn" style="padding:12px 22px;">Enroll now — it's free</button><span style="margin-left:12px; font-size:12.5px; color:var(--text-mute);">First lesson is open preview. Enroll for full access.</span>`
        }
      </div>
    </div>
  </section>

  <div class="wrap">
    <div class="layout">
      <aside class="curriculum" id="curriculum"></aside>
      <main>
        <div class="content-card" id="lessonPanel"></div>
        <div class="reviews">
          <div class="rev-summary">
            <div class="rev-score"><b>${avgRating(course)}</b><span class="stars">${starString(avgRating(course))}</span><div style="font-size:12px; color:var(--text-mute); margin-top:6px;">${course.reviews.length} ratings</div></div>
            <div id="ratingBars"></div>
          </div>
          <div class="write-review">
            <h3>Write a review</h3>
            <div class="star-pick" id="starPick"><span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span></div>
            <input type="text" id="reviewName" placeholder="Your name">
            <textarea id="reviewText" placeholder="What worked, what didn't — be specific, it helps the next learner."></textarea>
            <button class="btn btn-primary" id="submitReview">Post review</button>
          </div>
          <div id="reviewList"></div>
        </div>
      </main>
    </div>
  </div>`;
}

function avgRating(course){
  const t = course.reviews.length;
  if(!t) return '0.0';
  return (Math.round((course.reviews.reduce((a,r)=>a+r.stars,0)/t)*10)/10).toFixed(1);
}
function starString(avg){
  const full = Math.round(parseFloat(avg));
  return '★'.repeat(full) + '☆'.repeat(5-full);
}

let currentLessonState = {};

async function wireCoursePage(courseId){
  const course = courseCatalog[courseId];
  const all = flatLessons(course);
  const enrollments = await getEnrollments();
  let enrollment = enrollments[courseId];
  let isEnrolled = !!enrollment;
  currentLessonState.id = all[0].id;

  const enrollBtn = document.getElementById('enrollBtn');
  if(enrollBtn){
    enrollBtn.addEventListener('click', async () => {
      await enrollInCourse(courseId);
      location.hash = 'course/' + courseId;
      render();
    });
  }

  function isLessonLocked(lessonId){
    if(isEnrolled) return false;
    return all.findIndex(l=>l.id===lessonId) !== 0;
  }

  function renderCurriculum(){
    const el = document.getElementById('curriculum');
    let html = `<div class="curr-head">Course content <span>${all.length} lessons</span></div>`;
    course.modules.forEach(mod => {
      html += `<div class="module"><div class="module-title">${mod.title}</div>`;
      mod.lessons.forEach(l => {
        const done = isEnrolled && enrollment.progress[l.id];
        const locked = isLessonLocked(l.id);
        html += `<div class="lesson ${l.id===currentLessonState.id?'active':''} ${done?'done':''} ${locked?'locked':''}" data-id="${l.id}">
          <span class="check ${done?'done':''}">${done?'✓':''}</span>
          <span class="name">${l.name}</span>
          ${locked ? '<span class="lock-ic">🔒</span>' : `<span class="time">${l.time}</span>`}
        </div>`;
      });
      html += `</div>`;
    });
    el.innerHTML = html;
    el.querySelectorAll('.lesson').forEach(node => {
      node.addEventListener('click', () => { currentLessonState.id = node.dataset.id; renderLessonPanel(); renderCurriculum(); });
    });
  }

  function renderLessonPanel(){
    const idx = all.findIndex(l => l.id === currentLessonState.id);
    const lesson = all[idx];
    const locked = isLessonLocked(lesson.id);
    const panel = document.getElementById('lessonPanel');
    if(locked){
      panel.innerHTML = `
        <div class="locked-panel">
          <div class="lock-icon">🔒</div>
          <h2>Enroll to unlock this lesson</h2>
          <p>You're previewing "${all[0].name}" for free. Enroll to get all ${all.length} lessons, progress tracking, and certificate on completion.</p>
          <button class="btn btn-primary" id="unlockBtn" style="padding:11px 20px;">Enroll now — it's free</button>
        </div>`;
      document.getElementById('unlockBtn').addEventListener('click', async () => {
        await enrollInCourse(courseId);
        location.hash = 'course/' + courseId;
        render();
      });
      return;
    }
    const prev = all[idx-1], next = all[idx+1];
    const done = isEnrolled && enrollment.progress[lesson.id];
    panel.innerHTML = `
      ${lesson.html}
      <div class="lesson-nav">
        <div class="navpair">
          <button class="btn" id="prevBtn" ${!prev?'disabled style="opacity:.4;"':''}>← Previous</button>
          <button class="btn" id="nextBtn" ${!next?'disabled style="opacity:.4;"':''}>Next →</button>
        </div>
        ${isEnrolled ? `<button class="complete-btn ${done?'done':''}" id="completeBtn">${done ? '✓ Completed' : 'Mark as complete'}</button>` : ''}
      </div>`;
    if(prev) document.getElementById('prevBtn').addEventListener('click', () => { currentLessonState.id = prev.id; renderLessonPanel(); renderCurriculum(); });
    if(next) document.getElementById('nextBtn').addEventListener('click', () => { currentLessonState.id = next.id; renderLessonPanel(); renderCurriculum(); });
    const cbtn = document.getElementById('completeBtn');
    if(cbtn){
      cbtn.addEventListener('click', async () => {
        await markLessonDone(courseId, lesson.id);
        enrollment.progress[lesson.id] = true;
        renderLessonPanel();
        renderCurriculum();
        updateOverallProgress();
      });
    }
  }

  function updateOverallProgress(){
    const doneCount = all.filter(l => enrollment.progress[l.id]).length;
    const bar = document.querySelector('.op-fill');
    const label = document.querySelector('.op-top span:last-child');
    if(bar) bar.style.width = Math.round(doneCount/all.length*100) + '%';
    if(label) label.textContent = `${doneCount} / ${all.length} lessons`;
  }

  renderCurriculum();
  renderLessonPanel();

  /* reviews */
  let reviews = course.reviews.slice();
  let selectedStars = 0;

  function renderRatingBars(){
    const total = reviews.length;
    document.getElementById('ratingBars').innerHTML = [5,4,3,2,1].map(s => {
      const c = reviews.filter(r=>r.stars===s).length;
      const pct = total ? Math.round(c/total*100) : 0;
      return `<div class="rev-bar-row"><span style="width:30px;">${s}★</span><div class="rev-bar-track"><div class="rev-bar-fill" style="width:${pct}%;"></div></div><span style="width:28px; text-align:right;">${pct}%</span></div>`;
    }).join('');
  }
  function renderReviewList(){
    document.getElementById('reviewList').innerHTML = reviews.map(r => `
      <div class="review-card">
        <div class="review-person">
          <div class="avatar" style="background:linear-gradient(135deg,#06B6D4,#7C3AED); font-size:11px;">${r.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
          <div><b>${r.name}</b>${r.verified?'<span class="verified">Verified learner</span>':''}<br><span>${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span></div>
        </div>
        <p>${r.text}</p>
      </div>`).join('');
  }
  renderRatingBars();
  renderReviewList();

  document.querySelectorAll('#starPick span').forEach(star => {
    star.addEventListener('click', () => {
      selectedStars = parseInt(star.dataset.v);
      document.querySelectorAll('#starPick span').forEach(s => s.classList.toggle('on', parseInt(s.dataset.v) <= selectedStars));
    });
  });
  document.getElementById('submitReview').addEventListener('click', () => {
    const name = document.getElementById('reviewName').value.trim();
    const text = document.getElementById('reviewText').value.trim();
    if(!name || !text || selectedStars===0){ alert('Add your name, a rating, and a few words before posting.'); return; }
    reviews.unshift({ name, stars:selectedStars, verified:isEnrolled, text });
    document.getElementById('reviewName').value = '';
    document.getElementById('reviewText').value = '';
    selectedStars = 0;
    document.querySelectorAll('#starPick span').forEach(s => s.classList.remove('on'));
    renderRatingBars();
    renderReviewList();
  });
}

/* ---------------- DASHBOARD ---------------- */
async function renderDashboard(){
  const enrollments = await getEnrollments();
  const ids = Object.keys(enrollments);
  if(ids.length === 0){
    return `
    <div class="wrap">
      <div class="dash-head"><h2>My dashboard</h2></div>
      <div class="empty-state" style="margin-top:24px;">
        <div class="ic">📚</div>
        <h3>No courses yet</h3>
        <p>Enroll in a course to see your progress here.</p>
        <a class="btn btn-primary" data-route="home" href="#home">Browse courses</a>
      </div>
    </div>`;
  }
  let totalLessons = 0, totalDone = 0;
  ids.forEach(id => {
    const all = flatLessons(courseCatalog[id]);
    totalLessons += all.length;
    totalDone += all.filter(l => enrollments[id].progress[l.id]).length;
  });
  return `
  <div class="wrap">
    <div class="dash-head"><h2>My dashboard</h2><a class="btn" data-route="home" href="#home">Browse more courses</a></div>
    <div class="dash-stats">
      <div class="dstat"><b>${ids.length}</b><span>enrolled courses</span></div>
      <div class="dstat"><b>${totalDone}</b><span>lessons completed</span></div>
      <div class="dstat"><b>${totalLessons - totalDone}</b><span>lessons remaining</span></div>
      <div class="dstat"><b>${totalLessons ? Math.round(totalDone/totalLessons*100) : 0}%</b><span>overall progress</span></div>
    </div>
    <div id="dashCourseList"></div>
  </div>`;
}

async function wireDashboard(){
  const enrollments = await getEnrollments();
  const ids = Object.keys(enrollments);
  const listEl = document.getElementById('dashCourseList');
  if(!listEl) return;
  listEl.innerHTML = ids.map(id => {
    const c = courseCatalog[id];
    const all = flatLessons(c);
    const done = all.filter(l => enrollments[id].progress[l.id]).length;
    const pct = Math.round(done/all.length*100);
    return `
    <div class="dash-course" data-nav="course/${id}">
      <div class="dash-thumb" style="background:${c.thumbGrad};"></div>
      <div>
        <h3>${c.title}</h3>
        <div class="dmeta">${done} / ${all.length} lessons · ${c.instructor}</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
      </div>
      <a class="btn btn-primary" data-nav="course/${id}">${pct===100 ? 'Review' : 'Continue'} →</a>
    </div>`;
  }).join('');
  listEl.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => { location.hash = '#' + el.dataset.nav; });
  });
}
